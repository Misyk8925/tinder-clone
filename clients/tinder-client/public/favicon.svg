<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF5583;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D92E7F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="110" fill="url(#flameGradient)"/>

  <!-- Flame shape -->
  <g transform="translate(256, 256)">
    <!-- Main flame body -->
    <path d="M 0 -120 C -60 -80 -90 -20 -90 40 C -90 120 -40 160 0 160 C 40 160 90 120 90 40 C 90 -20 60 -80 0 -120 Z" fill="white"/>

    <!-- Flame curve detail -->
    <path d="M -40 -60 C -70 -20 -70 20 -40 60 C -20 20 -10 -10 -40 -60 Z" fill="url(#flameGradient)" opacity="0.3"/>
    <path d="M 40 -60 C 70 -20 70 20 40 60 C 20 20 10 -10 40 -60 Z" fill="url(#flameGradient)" opacity="0.3"/>
  </g>
</svg>
