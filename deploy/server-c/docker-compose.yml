# Server C — Event-driven matching layer
# Services: swipes-demo, match-service
#
# Оба сервиса работают через Kafka — нет жёстких HTTP-зависимостей между собой.
#
# Dokploy: укажи compose file = deploy/server-c/docker-compose.yml

services:

  swipes-demo:
    build:
      context: ../../services/swipes-demo
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8040:8040"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${INFRA_HOST}:5432/swipes_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${INFRA_HOST}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${INFRA_HOST}:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://${INFRA_HOST}:9080/realms/spring/protocol/openid-connect/certs
      # profiles-service живёт на Server B
      SERVICES_PROFILES_BASE_URL: http://${SERVER_B_HOST}:8010/api/v1/profiles
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8040/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 90s
      retries: 10

  match-service:
    build:
      context: ../../services/match
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${INFRA_HOST}:5432/match_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${INFRA_HOST}:9092
      KEYCLOAK_JWK_SET_URI: http://${INFRA_HOST}:9080/realms/spring/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://${INFRA_HOST}:9080
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_S3_BUCKET: ${MATCH_S3_BUCKET:-match-conversation-photos}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-http://${INFRA_HOST}:4566}
      CDN_ENABLED: ${CDN_ENABLED:-false}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 90s
      retries: 10
