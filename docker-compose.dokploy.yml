# =============================================================================
# Dokploy Full-Stack Docker Compose
# Deploy this file to any server running Dokploy.
# Copy .env.example → .env and fill in all required values before deploying.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:8.2.1-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Internal listener for container-to-container; external for host access (optional)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${KAFKA_EXTERNAL_HOST:-localhost}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: 9080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "9080:9080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 10
    networks:
      - backend

  localstack:
    image: localstack/localstack:3
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEFAULT_REGION: ${AWS_REGION:-eu-north-1}
      AWS_DEFAULT_REGION: ${AWS_REGION:-eu-north-1}
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ELK stack — remove if you use an external log aggregation service
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 10
    networks:
      - elk

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    restart: unless-stopped
    environment:
      - "LS_JAVA_OPTS=-Xmx256m -Xms256m"
    depends_on:
      elasticsearch:
        condition: service_healthy
    command: |
      bash -c "
      cat > /usr/share/logstash/pipeline/logstash.conf <<EOF
      input {
        tcp {
          port => 5000
          codec => json
        }
      }
      output {
        elasticsearch {
          hosts => ['http://elasticsearch:9200']
          index => 'logstash-%{+YYYY.MM.dd}'
        }
      }
      EOF
      /usr/local/bin/docker-entrypoint
      "
    networks:
      - elk

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk

  # ---------------------------------------------------------------------------
  # APPLICATION SERVICES
  # Startup order: config-server → discovery → all other services
  # ---------------------------------------------------------------------------

  config-server:
    build:
      context: ./services/config-server2
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - backend

  discovery:
    build:
      context: ./services/discovery
      dockerfile: Dockerfile2
    restart: unless-stopped
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - backend

  # Service name must match CN in profiles-service.p12 (CN=profiles-service, SAN=DNS:profiles-service)
  profiles-service:
    build:
      context: ./services/profiles
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/profiles_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_JWK_SET_URI: http://keycloak:9080/realms/spring/protocol/openid-connect/certs
      KEYCLOAK_URL: http://keycloak:9080
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-profiles-photos}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-http://localstack:4566}
      CDN_ENABLED: ${CDN_ENABLED:-false}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      # mTLS — mount production certs via volume and override these paths
      PROFILES_KEYSTORE_PATH: ${PROFILES_KEYSTORE_PATH:-classpath:profiles-service.p12}
      PROFILES_KEYSTORE_PASSWORD: ${PROFILES_KEYSTORE_PASSWORD:-changeit}
      PROFILES_TRUSTSTORE_PATH: ${PROFILES_TRUSTSTORE_PATH:-classpath:truststore.jks}
      PROFILES_TRUSTSTORE_PASSWORD: ${PROFILES_TRUSTSTORE_PASSWORD:-changeit}
      PROFILES_GRPC_KEYSTORE_PATH: ${PROFILES_GRPC_KEYSTORE_PATH:-classpath:profiles-service.p12}
      PROFILES_GRPC_KEYSTORE_PASSWORD: ${PROFILES_GRPC_KEYSTORE_PASSWORD:-changeit}
      PROFILES_GRPC_TRUSTSTORE_PATH: ${PROFILES_GRPC_TRUSTSTORE_PATH:-classpath:truststore.jks}
      PROFILES_GRPC_TRUSTSTORE_PASSWORD: ${PROFILES_GRPC_TRUSTSTORE_PASSWORD:-changeit}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8010/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 90s
      retries: 10
    networks:
      - backend

  swipes-demo:
    build:
      context: ./services/swipes-demo
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/swipes_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:9080/realms/spring/protocol/openid-connect/certs
      SERVICES_PROFILES_BASE_URL: http://profiles-service:8010/api/v1/profiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      profiles-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8040/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 90s
      retries: 10
    networks:
      - backend

  # Service name must match CN in consumer-service.p12
  consumer-service:
    build:
      context: ./services/consumer
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/consumer_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:9080/realms/spring/protocol/openid-connect/certs
      # mTLS server cert (consumer acts as mTLS server for deck)
      CONSUMER_KEYSTORE_PATH: ${CONSUMER_KEYSTORE_PATH:-classpath:consumer-service.p12}
      CONSUMER_KEYSTORE_PASSWORD: ${CONSUMER_KEYSTORE_PASSWORD:-changeit}
      CONSUMER_TRUSTSTORE_PATH: ${CONSUMER_TRUSTSTORE_PATH:-classpath:truststore.jks}
      CONSUMER_TRUSTSTORE_PASSWORD: ${CONSUMER_TRUSTSTORE_PASSWORD:-changeit}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8050/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 90s
      retries: 10
    networks:
      - backend

  match-service:
    build:
      context: ./services/match
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/match_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_JWK_SET_URI: http://keycloak:9080/realms/spring/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:9080
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_S3_BUCKET: ${MATCH_S3_BUCKET:-match-conversation-photos}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-http://localstack:4566}
      CDN_ENABLED: ${CDN_ENABLED:-false}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 90s
      retries: 10
    networks:
      - backend

  # Service name must match CN in deck-service.p12
  deck-service:
    build:
      context: ./services/deck
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # mTLS URLs — use container names, certs have DNS SANs for these names
      PROFILES_BASE_URL: https://profiles-service:8011/api/v1/profiles/internal
      SWIPES_BASE_URL: https://consumer-service:8051
      # mTLS client cert (deck presents this to profiles-service and consumer-service)
      DECK_KEYSTORE_PATH: ${DECK_KEYSTORE_PATH:-classpath:deck-service.p12}
      DECK_KEYSTORE_PASSWORD: ${DECK_KEYSTORE_PASSWORD:-changeit}
      DECK_TRUSTSTORE_PATH: ${DECK_TRUSTSTORE_PATH:-classpath:truststore.jks}
      DECK_TRUSTSTORE_PASSWORD: ${DECK_TRUSTSTORE_PASSWORD:-changeit}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      profiles-service:
        condition: service_healthy
      consumer-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 90s
      retries: 10
    networks:
      - backend

  # Service name must match CN in subscriptions-service.p12
  subscriptions-service:
    build:
      context: ./services/subscriptions
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/subscriptions_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:9080/realms/spring/protocol/openid-connect/certs
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:8095/success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:8095/cancel}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      # gRPC mTLS to profiles-service (port 9010)
      PROFILES_GRPC_ADDRESS: static://profiles-service:9010
      GRPC_OVERRIDE_AUTHORITY: profiles-service
      GRPC_MTLS_ENABLED: ${GRPC_MTLS_ENABLED:-true}
      SUBSCRIPTIONS_GRPC_KEYSTORE_PATH: ${SUBSCRIPTIONS_GRPC_KEYSTORE_PATH:-classpath:subscriptions-service.p12}
      SUBSCRIPTIONS_GRPC_KEYSTORE_PASSWORD: ${SUBSCRIPTIONS_GRPC_KEYSTORE_PASSWORD:-changeit}
      SUBSCRIPTIONS_GRPC_TRUSTSTORE_PATH: ${SUBSCRIPTIONS_GRPC_TRUSTSTORE_PATH:-classpath:truststore.jks}
      SUBSCRIPTIONS_GRPC_TRUSTSTORE_PASSWORD: ${SUBSCRIPTIONS_GRPC_TRUSTSTORE_PASSWORD:-changeit}
      PROFILES_BASE_URL: http://profiles-service:8010
    depends_on:
      postgres:
        condition: service_healthy
      profiles-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8095/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 90s
      retries: 10
    networks:
      - backend

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8222}:8222"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:9080/realms/spring/protocol/openid-connect/certs
      # Override upstream service URLs to use container names
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_URI: http://profiles-service:8010
      # Eureka (optional — gateway can use static URIs above instead)
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://discovery:8761/eureka
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
      EUREKA_INSTANCE_HOSTNAME: gateway
    depends_on:
      redis:
        condition: service_healthy
      profiles-service:
        condition: service_healthy
      swipes-demo:
        condition: service_healthy
      consumer-service:
        condition: service_healthy
      match-service:
        condition: service_healthy
      deck-service:
        condition: service_healthy
      subscriptions-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8222/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 90s
      retries: 10
    labels:
      # Traefik labels for Dokploy reverse proxy
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.gateway.entrypoints=websecure"
      - "traefik.http.routers.gateway.tls.certresolver=letsencrypt"
      - "traefik.http.services.gateway.loadbalancer.server.port=8222"
    networks:
      - backend

# ---------------------------------------------------------------------------
# VOLUMES
# ---------------------------------------------------------------------------
volumes:
  postgres-data:
  redis-data:
  zookeeper-data:
  kafka-data:
  localstack-data:
  elasticsearch-data:

# ---------------------------------------------------------------------------
# NETWORKS
# ---------------------------------------------------------------------------
networks:
  backend:
    driver: bridge
  elk:
    driver: bridge
