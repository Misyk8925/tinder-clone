  profiles:
    build:
      context: ./services/profiles
    container_name: profiles
    <<: *prod-mid-defaults
    ports: []
    depends_on:

      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:?AWS_S3_BUCKET is required}
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:?CLOUDFRONT_DOMAIN is required}
      CDN_ENABLED: ${CDN_ENABLED:-true}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-spring}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:?KEYCLOAK_CLIENT_ID is required}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET is required}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:?KEYCLOAK_ADMIN_USERNAME is required}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      EUREKA_CLIENT_ENABLED: "false"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/profiles_db
      SPRING_DATASOURCE_USERNAME: ${PROFILES_DB_USER:?PROFILES_DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${PROFILES_DB_PASSWORD:?PROFILES_DB_PASSWORD is required}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 8
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 3
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:9080/realms/spring/protocol/openid-connect/certs}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:9080}
      MEDIA_SERVICE_BASE_URL: http://swipes:8040
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
      MANAGEMENT_TRACING_ENABLED: "false"

      PROFILES_KEYSTORE_PATH: file:/certs/profiles-service.p12
      PROFILES_KEYSTORE_PASSWORD: ${MTLS_KEYSTORE_PASSWORD:?MTLS_KEYSTORE_PASSWORD is required}
      PROFILES_TRUSTSTORE_PATH: file:/certs/truststore.jks
      PROFILES_TRUSTSTORE_PASSWORD: ${MTLS_TRUSTSTORE_PASSWORD:?MTLS_TRUSTSTORE_PASSWORD is required}
      PROFILES_GRPC_KEYSTORE_PATH: file:/certs/profiles-service.p12
      PROFILES_GRPC_KEYSTORE_PASSWORD: ${MTLS_KEYSTORE_PASSWORD:?MTLS_KEYSTORE_PASSWORD is required}
      PROFILES_GRPC_TRUSTSTORE_PATH: file:/certs/truststore.jks
      PROFILES_GRPC_TRUSTSTORE_PASSWORD: ${MTLS_TRUSTSTORE_PASSWORD:?MTLS_TRUSTSTORE_PASSWORD is required}
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:+UseZGC -XX:InitialRAMPercentage=40.0 -XX:MaxRAMPercentage=55.0 -Dfile.encoding=UTF-8 -Dsun.net.inetaddr.ttl=60 -Djava.io.tmpdir=/tmp"
    volumes:
      - /etc/dokploy/certs/tinderclone/profiles-service.p12:/certs/profiles-service.p12:ro
      - /etc/dokploy/certs/tinderclone/truststore.jks:/certs/truststore.jks:ro
    networks:
      - app
    mem_limit: 640m
    cpus: "1.00"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8010/actuator/health"]
      interval: 15s
      timeout: 10s
      start_period: 300s
      retries: 10

  deck:
    build:
      context: ./services/deck
    container_name: deck
    <<: *prod-mid-defaults
    ports: []
    depends_on:

      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PROFILES_BASE_URL: https://profiles:8011/api/v1/profiles/internal
      SWIPES_BASE_URL: https://consumer:8051
      DECK_KEYSTORE_PATH: file:/certs/deck-service.p12
      DECK_KEYSTORE_PASSWORD: ${MTLS_KEYSTORE_PASSWORD:?MTLS_KEYSTORE_PASSWORD is required}
      DECK_TRUSTSTORE_PATH: file:/certs/truststore.jks
      DECK_TRUSTSTORE_PASSWORD: ${MTLS_TRUSTSTORE_PASSWORD:?MTLS_TRUSTSTORE_PASSWORD is required}
      SPRING_REDIS_TIMEOUT: 30000
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:+UseZGC -XX:InitialRAMPercentage=40.0 -XX:MaxRAMPercentage=55.0 -Dfile.encoding=UTF-8 -Dsun.net.inetaddr.ttl=60 -Djava.io.tmpdir=/tmp"
    volumes:
      - /etc/dokploy/certs/tinderclone/deck-service.p12:/certs/deck-service.p12:ro
      - /etc/dokploy/certs/tinderclone/truststore.jks:/certs/truststore.jks:ro
    networks:
      - app
    mem_limit: 384m
    cpus: "0.60"
    healthcheck:
      test: ["CMD-SHELL", "(wget -q --server-response -O- http://localhost:8030/actuator/health 2>&1 || true) | grep -Eq 'HTTP/1.1 (200|401)' || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 300s
      retries: 10

  gateway:
    build:
      context: ./services/gateway
    container_name: gateway
    <<: *prod-mid-defaults
    ports:
      - "8222:8222"
    depends_on:

      redis:
        condition: service_healthy
      profiles:
        condition: service_healthy


    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_CLIENT_ENABLED: "false"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:9080/realms/spring/protocol/openid-connect/certs}
      PROFILES_SERVICE_URL: http://profiles:8010
      SWIPES_SERVICE_URL: http://swipes:8040
      CONSUMER_SERVICE_URL: http://consumer:8050
      DECK_SERVICE_URL: http://deck:8030
      MATCH_SERVICE_URL: http://match:8080
      MATCH_WS_URL: ws://match:8080
      SUBSCRIPTIONS_SERVICE_URL: http://subscriptions:8095
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:+UseZGC -XX:InitialRAMPercentage=40.0 -XX:MaxRAMPercentage=55.0 -Dfile.encoding=UTF-8 -Dsun.net.inetaddr.ttl=60 -Djava.io.tmpdir=/tmp"
    networks:
      - app
    mem_limit: 384m
    cpus: "0.60"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8222 || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 300s
      retries: 10

  match:
    build:
      context: ./services/match
    container_name: match
    <<: *prod-mid-defaults
    ports: []
    depends_on:

      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:?AWS_S3_BUCKET is required}
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:?CLOUDFRONT_DOMAIN is required}
      CDN_ENABLED: ${CDN_ENABLED:-true}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/match_db
      SPRING_DATASOURCE_USERNAME: ${MATCH_DB_USER:?MATCH_DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${MATCH_DB_PASSWORD:?MATCH_DB_PASSWORD is required}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 4
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:9080/realms/spring/protocol/openid-connect/certs}
      KEYCLOAK_AUTH_SERVER_URL: ${KEYCLOAK_AUTH_SERVER_URL:-http://keycloak:9080}
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:+UseZGC -XX:InitialRAMPercentage=40.0 -XX:MaxRAMPercentage=55.0 -Dfile.encoding=UTF-8 -Dsun.net.inetaddr.ttl=60 -Djava.io.tmpdir=/tmp"
    networks:
      - app
    mem_limit: 512m
    cpus: "0.60"
    healthcheck:
      test: ["CMD-SHELL", "(wget -q --server-response -O- http://localhost:8080/actuator/health 2>&1 || true) | grep -Eq 'HTTP/1.1 (200|401)' || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 300s
      retries: 10

  consumer:
    build:
      context: ./services/consumer
    container_name: consumer
    <<: *prod-mid-defaults
    ports: []
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/consumer_db
      SPRING_DATASOURCE_USERNAME: ${CONSUMER_DB_USER:?CONSUMER_DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${CONSUMER_DB_PASSWORD:?CONSUMER_DB_PASSWORD is required}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 4
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CONSUMER_KEYSTORE_PATH: file:/certs/consumer-service.p12
      CONSUMER_KEYSTORE_PASSWORD: ${MTLS_KEYSTORE_PASSWORD:?MTLS_KEYSTORE_PASSWORD is required}
      CONSUMER_TRUSTSTORE_PATH: file:/certs/truststore.jks
      CONSUMER_TRUSTSTORE_PASSWORD: ${MTLS_TRUSTSTORE_PASSWORD:?MTLS_TRUSTSTORE_PASSWORD is required}
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:+UseZGC -XX:InitialRAMPercentage=40.0 -XX:MaxRAMPercentage=55.0 -Dfile.encoding=UTF-8 -Dsun.net.inetaddr.ttl=60 -Djava.io.tmpdir=/tmp"
    volumes:
      - /etc/dokploy/certs/tinderclone/consumer-service.p12:/certs/consumer-service.p12:ro
      - /etc/dokploy/certs/tinderclone/truststore.jks:/certs/truststore.jks:ro
    networks:
      - app
    mem_limit: 512m
    cpus: "0.60"
    healthcheck:
      test: ["CMD-SHELL", "(wget -q --server-response -O- http://localhost:8050/actuator/health 2>&1 || true) | grep -Eq 'HTTP/1.1 (200|401)' || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 300s
      retries: 10

  subscriptions:
    build:
      context: ./services/subscriptions
    container_name: subscriptions
    <<: *prod-mid-defaults
    ports: []
    depends_on:

      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET is required}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:?STRIPE_PRICE_ID is required}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/subscriptions_db
      SPRING_DATASOURCE_USERNAME: ${SUBSCRIPTIONS_DB_USER:?SUBSCRIPTIONS_DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${SUBSCRIPTIONS_DB_PASSWORD:?SUBSCRIPTIONS_DB_PASSWORD is required}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 4
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PROFILES_GRPC_ADDRESS: static://profiles:9010
      PROFILES_BASE_URL: http://profiles:8010/api/profiles
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:9080/realms/spring/protocol/openid-connect/certs}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:?STRIPE_SUCCESS_URL is required}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:?STRIPE_CANCEL_URL is required}
      SUBSCRIPTIONS_GRPC_KEYSTORE_PATH: file:/certs/subscriptions-service.p12
      SUBSCRIPTIONS_GRPC_KEYSTORE_PASSWORD: ${MTLS_KEYSTORE_PASSWORD:?MTLS_KEYSTORE_PASSWORD is required}
      SUBSCRIPTIONS_GRPC_TRUSTSTORE_PATH: file:/certs/truststore.jks
      SUBSCRIPTIONS_GRPC_TRUSTSTORE_PASSWORD: ${MTLS_TRUSTSTORE_PASSWORD:?MTLS_TRUSTSTORE_PASSWORD is required}
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:+UseZGC -XX:InitialRAMPercentage=40.0 -XX:MaxRAMPercentage=55.0 -Dfile.encoding=UTF-8 -Dsun.net.inetaddr.ttl=60 -Djava.io.tmpdir=/tmp"
    volumes:
      - /etc/dokploy/certs/tinderclone/subscriptions-service.p12:/certs/subscriptions-service.p12:ro
      - /etc/dokploy/certs/tinderclone/truststore.jks:/certs/truststore.jks:ro
    networks:
      - app
    mem_limit: 384m
    cpus: "0.60"
    healthcheck:
      test: ["CMD-SHELL", "(wget -q --server-response -O- http://localhost:8095/actuator/health 2>&1 || true) | grep -Eq 'HTTP/1.1 (200|401)' || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 300s
      retries: 10

  swipes:
    build:
      context: ./services/swipes-demo
    container_name: swipes
    <<: *prod-mid-defaults
    ports: []
    depends_on:

      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/swipes_db
      SPRING_DATASOURCE_USERNAME: ${SWIPES_DB_USER:?SWIPES_DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${SWIPES_DB_PASSWORD:?SWIPES_DB_PASSWORD is required}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 4
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:9080/realms/spring/protocol/openid-connect/certs}
      SERVICES_PROFILES_BASE_URL: http://profiles:8010/api/v1/profiles
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:+UseZGC -XX:InitialRAMPercentage=40.0 -XX:MaxRAMPercentage=55.0 -Dfile.encoding=UTF-8 -Dsun.net.inetaddr.ttl=60 -Djava.io.tmpdir=/tmp"
    networks:
      - app
    mem_limit: 384m
    cpus: "0.60"
    healthcheck:
      test: ["CMD-SHELL", "(wget -q --server-response -O- http://localhost:8040/actuator/health 2>&1 || true) | grep -Eq 'HTTP/1.1 (200|401)' || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 300s
      retries: 10

  tinder-client:
    build:
      context: ./clients/tinder-client
    container_name: tinder-client
    <<: *prod-mid-defaults
    ports: []
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - app
    mem_limit: 160m
    cpus: "0.30"


networks:
  app:
    driver: bridge
  elk:
    driver: bridge

volumes:
  profiles-pgdata:
  elasticsearch-data:
    driver: local
  kc-pgdata:

