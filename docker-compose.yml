x-prod-mid-defaults: &prod-mid-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "8m"
      max-file: "4"

services:
  postgres:
    image: postgis/postgis:17-3.4
    <<: *prod-mid-defaults
    ports:
      - "127.0.0.1:5435:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "-c max_connections=80 -c shared_buffers=128MB"
      PROFILES_DB_PASSWORD: ${PROFILES_DB_PASSWORD:?PROFILES_DB_PASSWORD is required}
      MATCH_DB_PASSWORD: ${MATCH_DB_PASSWORD:?MATCH_DB_PASSWORD is required}
      CONSUMER_DB_PASSWORD: ${CONSUMER_DB_PASSWORD:?CONSUMER_DB_PASSWORD is required}
      SUBSCRIPTIONS_DB_PASSWORD: ${SUBSCRIPTIONS_DB_PASSWORD:?SUBSCRIPTIONS_DB_PASSWORD is required}
      SWIPES_DB_PASSWORD: ${SWIPES_DB_PASSWORD:?SWIPES_DB_PASSWORD is required}
    volumes:
      - profiles-pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
      - ./migrations/migration:/docker-entrypoint-initdb.d/migration:ro
    networks:
      - app
    mem_limit: 512m
    cpus: "1.00"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  keycloak-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - kc-pgdata:/var/lib/postgresql/data
    networks:
      - app

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.5
    command: [ "start","--http-enabled=true","--http-port=9080" ]
    ports:
      - "9080:9080"
      - "9000:9000"
    volumes:
      - ./docker/keycloak/themes:/opt/keycloak/themes
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin@1234
      KC_PROXY: edge
      KC_DB: postgres
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_FEATURES: token-exchange,admin-fine-grained-authz
      KC_HOSTNAME_URL: "https://auth.mykh.studio"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
    networks:
      - app



  redis:
    image: redis:8.2.1-alpine
    <<: *prod-mid-defaults
    ports: []
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - app
    mem_limit: 128m
    cpus: "0.35"
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    <<: *prod-mid-defaults
    ports: []
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZK_SERVER_HEAP: 256
    networks:
      - app
    mem_limit: 384m
    cpus: "0.60"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    <<: *prod-mid-defaults
    depends_on:
      zookeeper:
        condition: service_started
    ports: []
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx384m -Xms256m"
    networks:
      - app
    mem_limit: 768m
    cpus: "1.00"
    healthcheck:
      # Lightweight healthcheck to avoid Kafka CLI timeouts on slower hosts.
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/29092'"]
      interval: 15s
      timeout: 10s
      start_period: 240s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    <<: *prod-mid-defaults
    ports: []
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - elk
    mem_limit: 1g
    cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    <<: *prod-mid-defaults
    ports: []
    environment:
      - "LS_JAVA_OPTS=-Xms128m -Xmx128m"
    networks:
      - elk
      - app
    depends_on:
      elasticsearch:
        condition: service_healthy
    command: |
      bash -c "
      cat > /usr/share/logstash/pipeline/logstash.conf <<EOF
      input {
        tcp {
          port => 5000
          codec => json
        }
      }
      output {
        elasticsearch {
          hosts => ['http://elasticsearch:9200']
          index => 'logstash-%{+YYYY.MM.dd}'
        }
      }
      EOF
      /usr/local/bin/docker-entrypoint
      "
    mem_limit: 256m
    cpus: "0.50"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    <<: *prod-mid-defaults
    ports:
      - "127.0.0.1:5602:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy
    mem_limit: 256m
    cpus: "0.50"

