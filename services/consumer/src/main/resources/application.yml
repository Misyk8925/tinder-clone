spring:
  jpa:
    properties:
      dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: consumer-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  datasource:
      url: jdbc:postgresql://127.0.0.1:54322/postgres
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver

server:
  port: 8050

# Internal mTLS HTTPS port — deck connects here for swipe history checks
internal:
  server:
    port: 8051
    ssl:
      enabled: true
      # Override with env var CONSUMER_KEYSTORE_PATH for Docker/production
      key-store: ${CONSUMER_KEYSTORE_PATH:classpath:consumer-service.p12}
      key-store-password: ${CONSUMER_KEYSTORE_PASSWORD:changeit}
      key-store-type: PKCS12
      client-auth: need
      trust-store: ${CONSUMER_TRUSTSTORE_PATH:classpath:truststore.jks}
      trust-store-password: ${CONSUMER_TRUSTSTORE_PASSWORD:changeit}
      trust-store-type: PKCS12

# mTLS for /between/batch endpoint: only deck-service CN is allowed
mtls:
  allowed-client-cns:
    - deck-service

app:
  kafka:
    topic:
      swipe-created: swipe-created
      swipe-saved: swipe-saved
      profile-created: profile.created
      profile-deleted: profile.deleted
      match-created: match.created

outbox:
  publisher:
    enabled: true
    batch-size: 50
    max-batches-per-run: 5
    poll-interval-ms: 100
    initial-backoff-ms: 1000
    max-backoff-ms: 60000
    backoff-multiplier: 2.0
    send-timeout-ms: 5000
    max-error-length: 1000
    max-retries: 10
