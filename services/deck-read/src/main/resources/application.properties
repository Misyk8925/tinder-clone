# ─── HTTP ────────────────────────────────────────────────────────────────────
quarkus.application.name=deck-read
quarkus.http.port=8040

# ─── Auth: Keycloak JWK (realm root; certs endpoint is auto-discovered) ───────
quarkus.oidc.auth-server-url=${KEYCLOAK_REALM_URL:http://localhost:8080/realms/tinder}
quarkus.oidc.application-type=service
# Keep OIDC enabled in tests (DeckResource injects JsonWebToken, which only exists when OIDC is
# on). OIDC initializes lazily and only contacts Keycloak on a secured request, so the reader
# test boots fine without a running realm. Don't let OIDC Dev Services spin up a Keycloak container.
%test.quarkus.keycloak.devservices.enabled=false

# ─── Redis (read-only) ────────────────────────────────────────────────────────
# Host is profile-scoped so the test profile has NO fixed host and Quarkus Dev Services
# spins up a throwaway Redis container automatically (Docker required, as for the deck tests).
%dev.quarkus.redis.hosts=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
%prod.quarkus.redis.hosts=redis://${REDIS_HOST:redis}:${REDIS_PORT:6379}
# Connection pool sized for high RPS (defaults are 6 / 24, which overflow under load).
quarkus.redis.max-pool-size=${REDIS_MAX_POOL_SIZE:50}
quarkus.redis.max-pool-waiting=${REDIS_MAX_POOL_WAITING:2048}

# ─── Write service: ensure-on-miss (plain HTTP) ───────────────────────────────
quarkus.rest-client.deck-ensure.url=${DECK_BASE_URL:http://localhost:8030}
quarkus.rest-client.deck-ensure.connect-timeout=2000
quarkus.rest-client.deck-ensure.read-timeout=5000

# ─── Profiles service: hydrate IDs -> profiles (mTLS required) ────────────────
quarkus.rest-client.profiles.url=${PROFILES_BASE_URL:https://localhost:8011/api/v1/profiles/internal}
quarkus.rest-client.profiles.connect-timeout=2000
quarkus.rest-client.profiles.read-timeout=5000
quarkus.rest-client.profiles.key-store=${DECK_READ_KEYSTORE_PATH:classpath:deck-read-service.p12}
quarkus.rest-client.profiles.key-store-password=${DECK_READ_KEYSTORE_PASSWORD:changeit}
quarkus.rest-client.profiles.key-store-type=PKCS12
quarkus.rest-client.profiles.trust-store=${DECK_READ_TRUSTSTORE_PATH:classpath:truststore.jks}
quarkus.rest-client.profiles.trust-store-password=${DECK_READ_TRUSTSTORE_PASSWORD:changeit}
quarkus.rest-client.profiles.trust-store-type=JKS
# Keep-alive + a large connection pool so concurrent hydration reuses TLS sessions.
quarkus.rest-client.profiles.keep-alive=true
quarkus.rest-client.profiles.connection-pool-size=${PROFILES_POOL_SIZE:100}

# ─── Read tuning (consumed by DeckRedisReader / DeckQueryService) ─────────────
deck-read.ttl-minutes=60
deck-read.default-limit=20
deck-read.max-raw-batch-size=500

# ─── Profile hydration cache (cuts repeated /by-ids calls under load) ─────────
deck-read.profile-cache.ttl-seconds=60
# In tests, expire the fresh tier immediately so stale-while-revalidate is exercisable.
%test.deck-read.profile-cache.ttl-seconds=0
# Hard cap; entries between ttl and stale-ttl are served only as a fallback when the
# profiles service is unavailable (stale-while-revalidate).
deck-read.profile-cache.stale-ttl-seconds=600
deck-read.profile-cache.max-size=100000

# ─── Observability ────────────────────────────────────────────────────────────
quarkus.micrometer.export.prometheus.enabled=true
# health is served at /q/health, metrics at /q/metrics
