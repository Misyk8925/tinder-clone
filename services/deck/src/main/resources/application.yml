spring:
  application:
    name: deck
  data:
    redis:
      host: localhost
      port: 6379

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: deck-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.tinder.deck.kafka.dto"
    listener:
      concurrency: 20  # Number of consumer threads
      ack-mode: manual  # Manual commit for better control

profiles:
  # mTLS: use https. For plain-HTTP tests override with http and set mtls.enabled=false
  base-url: https://localhost:8011/api/v1/profiles/internal
swipes:
  # mTLS: use https on internal mTLS port 8051 (plain port 8050 is HTTP-only)
  base-url: https://localhost:8051

# mTLS client configuration (deck acts as mTLS client to profiles and consumer)
mtls:
  enabled: true
  client:
    # Override with DECK_KEYSTORE_PATH for Docker/production
    key-store: ${DECK_KEYSTORE_PATH:classpath:deck-service.p12}
    key-store-password: ${DECK_KEYSTORE_PASSWORD:changeit}
    key-store-type: PKCS12
    trust-store: ${DECK_TRUSTSTORE_PATH:classpath:truststore.jks}
    trust-store-password: ${DECK_TRUSTSTORE_PASSWORD:changeit}
    trust-store-type: PKCS12

server:
  port: 8030

deck:
  parallelism: 32
  request-timeout-ms: 4000
  retries: 1
  ttl-minutes: 60
  per-user-limit: 500
  search-limit: 2000

  # Per-client HTTP timeouts (can be overridden per environment)
  profiles-connect-timeout-ms: 2000
  profiles-response-timeout-ms: 5000
  swipes-connect-timeout-ms: 2000
  swipes-response-timeout-ms: 5000

  # Preferences Cache Configuration
  # Optimizes batch rebuilds by sharing candidate queries across users with same preferences
  # Example: 1000 users with 10 preference groups → only 10 DB queries instead of 1000
  # Enabled: with 1000 users split into 2 preference groups (MALE→FEMALE, FEMALE→MALE),
  # only 2 DB queries are needed instead of 1000.
  preferences-cache-enabled: true
  preferences-cache-ttl-minutes: 5  # Short TTL ensures data freshness

  # New configuration for event-driven rebuild
  rebuild:
    lock-timeout-seconds: 30
    lock-retry-max-attempts: 3
    lock-retry-delay-ms: 100
    queue:
      max-size: 10000
      worker-threads: 5
      high-priority-weight: 3  # Process 3 high-priority tasks per 1 low-priority
    stale:
      ttl-hours: 24  # How long to keep stale markers

  scheduler:
    # Runs every minute — at 1000 users with concurrency=50 this typically completes in ~90s
    cron: "0 0/1 * * * *"
    max-concurrent-rebuilds: 50
    user-rebuild-timeout-seconds: 30

# Kafka topics
kafka:
  topics:
    profile-events: profile.updated
    swipe-events: swipe-created
    delete-events: profile.deleted

# Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# Logging
logging:
  level:
    com.tinder.deck.adapters: DEBUG
