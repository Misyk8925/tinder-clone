spring:
    config:
      # URL берётся из spring.cloud.config.uri (env: SPRING_CLOUD_CONFIG_URI).
      # По умолчанию http://localhost:8888 — работает для локальной разработки.
      import: optional:configserver:
    application:
      name: discovery-service
server:
  port: 8761
eureka:
  instance.hostname: localhost
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/