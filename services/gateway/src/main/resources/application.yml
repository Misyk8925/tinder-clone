eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    hostname: localhost

server:
  port: 8222 # port on which the API Gateway will work. Clients will send requests to this port.

spring:

  data:
    redis:
      host: localhost
      port: 6379
  application:
    name: gateway # application name that can be used for identification in logs or monitoring.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri:  http://localhost:9080/realms/spring/protocol/openid-connect/certs
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            pool:
              max-idle-time: 10s    # must be < Tomcat keepAliveTimeout (default 20s)
              max-life-time: 60s
            response-timeout: 30s
            connect-timeout: 5000   # ms
          routes:
            ############################## PROFILES ROUTES
            - id: profile-create
              uri: ${PROFILES_SERVICE_URL:http://localhost:8010}
              predicates:
                - Path=/api/v1/profiles
                - Method=POST
              filters:
                - name: RoleBasedRateLimitFilter
                  args:
                    adminCapacity:  1000000000
                    adminPeriodInSeconds: 3600
                    premiumCapacity: 50
                    premiumPeriodInSeconds: 3600
                    basicCapacity: 5
                    basicPeriodInSeconds: 3600
                    anonCapacity: 0
                    anonPeriodInSeconds: 7200

            - id: profile-update
              uri: ${PROFILES_SERVICE_URL:http://localhost:8010}
              predicates:
                - Path=/api/v1/profiles/**
                - Method=PUT, PATCH
              filters:
                - name: RoleBasedRateLimitFilter
                  args:
                    adminCapacity:  1000000000
                    adminPeriodInSeconds: 3600
                    premiumCapacity: 50
                    premiumPeriodInSeconds: 3600
                    basicCapacity: 20
                    basicPeriodInSeconds: 3600
                    anonCapacity: 1
                    anonPeriodInSeconds: 3600
            - id: profile-delete
              uri: ${PROFILES_SERVICE_URL:http://localhost:8010}
              predicates:
                - Path=/api/v1/profiles/**
                - Method=DELETE
              filters:
                - name: RoleBasedRateLimitFilter
                  args:
                    adminCapacity: 50
                    adminPeriodInSeconds: 3600
                    premiumCapacity: 20
                    premiumPeriodInSeconds: 3600
                    basicCapacity: 5
                    basicPeriodInSeconds: 3600
                    anonCapacity: 1
                    anonPeriodInSeconds: 3600

            - id: profile-me
              uri: ${PROFILES_SERVICE_URL:http://localhost:8010}
              predicates:
                - Path=/api/v1/profiles/me
                - Method=GET

            - id: profile-other
              uri: ${PROFILES_SERVICE_URL:http://localhost:8010}
              predicates:
                - Path=/api/v1/profiles/**
              filters:
                - name: RoleBasedRateLimitFilter
                  args:
                    adminCapacity:  1000000000
                    adminPeriodInSeconds: 3600
                    premiumCapacity: 300
                    premiumPeriodInSeconds: 3600
                    basicCapacity: 120
                    basicPeriodInSeconds: 3600
                    anonCapacity: 1
                    anonPeriodInSeconds: 3600

              ############################## SWIPES ROUTES

            - id: swipes-super
              uri: ${SWIPES_SERVICE_URL:http://localhost:8040}
              predicates:
                - Path=/api/v1/swipes/super
                - Method=POST
              filters:
                - PremiumOrAdminFilter

            - id: swipes
              uri: ${SWIPES_SERVICE_URL:http://localhost:8040}
              predicates:
                - Path=/api/v1/swipes
              filters:
                - name: RoleBasedRateLimitFilter
                  args:
                    adminCapacity:  1000000000
                    adminPeriodInSeconds: 3600
                    premiumCapacity: 500
                    premiumPeriodInSeconds: 3600
                    basicCapacity: 100
                    basicPeriodInSeconds: 3600
                    anonCapacity: 10
                    anonPeriodInSeconds: 3600

              ############################## LIKES YOU (premium + admin only)

            - id: consumer-liked-me
              uri: ${CONSUMER_SERVICE_URL:http://localhost:8050}
              predicates:
                - Path=/api/v1/swipes/liked-me
                - Method=GET
              filters:
                - PremiumOrAdminFilter

              ############################## DECK ROUTES (admin / monitoring)

            - id: deck-admin
              uri: ${DECK_SERVICE_URL:http://localhost:8030}
              predicates:
                - Path=/api/v1/admin/deck/**
              filters:
                - name: RoleBasedRateLimitFilter
                  args:
                    adminCapacity:  1000000000
                    adminPeriodInSeconds: 3600
                    premiumCapacity: 0
                    premiumPeriodInSeconds: 3600
                    basicCapacity: 0
                    basicPeriodInSeconds: 3600
                    anonCapacity: 0
                    anonPeriodInSeconds: 3600

              ############################## MATCH ROUTES

            - id: match-ws
              uri: ${MATCH_WS_URL:ws://localhost:8080}
              predicates:
                - Path=/ws/**

            - id: match-conversations
              uri: ${MATCH_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/rest/conversations/**

            - id: match-other
              uri: ${MATCH_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/match/**

              ############################## SUBSCRIPTIONS ROUTES

            - id: subscriptions-billing
              uri: ${SUBSCRIPTIONS_SERVICE_URL:http://localhost:8095}
              predicates:
                - Path=/api/v1/billing/**
              filters:
                - name: RoleBasedRateLimitFilter
                  args:
                    adminCapacity:  1000000000
                    adminPeriodInSeconds: 3600
                    premiumCapacity: 20
                    premiumPeriodInSeconds: 3600
                    basicCapacity: 10
                    basicPeriodInSeconds: 3600
                    anonCapacity: 0
                    anonPeriodInSeconds: 3600

            - id: subscriptions-webhook
              uri: ${SUBSCRIPTIONS_SERVICE_URL:http://localhost:8095}
              predicates:
                - Path=/api/v1/webhook/**
              # No rate-limit filter — Stripe webhook must not be blocked by JWT rate-limiting


custom:
  admin:
    rate-limit: 1000000000
management:
  tracing:
    sampling:
      probability: 1.0
