logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
server:
  port: 8010
  servlet:
    context-path: /api/v1/profiles
spring:
  grpc:
    server:
      port: 9010
      servlet:
        enabled: false   # run gRPC on its own port (Netty), not embedded in Servlet
  config:
    import: "optional:file:services/profiles/.env.properties"
  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 5
        enable.idempotence: true
        spring.json.add.type.headers: false

  datasource:
    url: jdbc:postgresql://127.0.0.1:54322/postgres
    username: postgres
    password: postgres
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri:  http://localhost:9080/realms/spring/protocol/openid-connect/certs
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  application:
    name: profiles-service
  autoconfigure:
    # Disable gRPC JWT security auto-config — gRPC endpoints are internal only, no JWT required
    exclude:
      - org.springframework.grpc.autoconfigure.server.security.OAuth2ResourceServerAutoConfiguration
  cloud:
    config:
      enabled: false
app:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    presign-exp-seconds: 300
  cloudfront:
    domain: ${CLOUDFRONT_DOMAIN:d123example.cloudfront.net}
    enabled: ${CDN_ENABLED:false}
  geocoding:
    user-agent: "TinderClone/1.0 (tclone@tclone.com)"
    base-url: "https://nominatim.openstreetmap.org"
    country-codes:  "de,at,pl"
    timeout-ms: 5000
    retries: 3
    retry-backoff-ms: 400

cloud:
  aws:
    region: ${AWS_REGION:${AWS_DEFAULT_REGION:eu-north-1}}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID:placeholder-access-key}
      secret-key: ${AWS_SECRET_ACCESS_KEY:placeholder-secret-key}
    s3:
      endpoint: ${AWS_S3_ENDPOINT:}

keycloak:
  auth-server-url: http://localhost:6700
  keycloakUrl: ${KEYCLOAK_URL:http://localhost:9080}
  realm: spring
  client-id: spring-app
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin@1234}

media:
  service:
    base-url: ${MEDIA_SERVICE_BASE_URL:http://localhost:8040}
    ready-poll-max-attempts: ${MEDIA_READY_POLL_MAX_ATTEMPTS:30}
    ready-poll-interval-ms: ${MEDIA_READY_POLL_INTERVAL_MS:200}

# Kafka topics
kafka:
  topics:
    profile-events:
      updated: profile.updated
      created: profile.created
      deleted: profile.deleted

outbox:
  publisher:
    enabled: true
    batch-size: 100
    max-batches-per-run: 5
    poll-interval-ms: 1000
    initial-backoff-ms: 1000
    max-backoff-ms: 60000
    backoff-multiplier: 2.0
    send-timeout-ms: 5000
    max-retries: 10

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 30
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.lang.Exception
        ignoreExceptions:
          - java.lang.IllegalArgumentException
    instances:
      nominatimClient:
        baseConfig: default
        slowCallDurationThreshold: 1500ms
        failureRateThreshold: 60
      redisCache:
        baseConfig: default
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallDurationThreshold: 1000ms
        waitDurationInOpenState: 20s
      kafkaProducer:
        baseConfig: default
        slidingWindowSize: 50
        minimumNumberOfCalls: 10
        failureRateThreshold: 60
        slowCallDurationThreshold: 3000ms
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 10
  bulkhead:
    instances:
      nominatimClient:
        maxConcurrentCalls: 20
        maxWaitDuration: 0
      redisCache:
        maxConcurrentCalls: 500
        maxWaitDuration: 500ms
  retry:
    instances:
      nominatimClient:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      redisCache:
        maxAttempts: 2
        waitDuration: 100ms
