logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
server:
  port: 8010
  servlet:
    context-path: /

# Dedicated internal HTTPS port with mTLS (used by deck service)
internal:
  server:
    port: 8011
    ssl:
      enabled: true
      # Override with env var PROFILES_KEYSTORE_PATH for Docker/production
      key-store: ${PROFILES_KEYSTORE_PATH:classpath:profiles-service.p12}
      key-store-password: ${PROFILES_KEYSTORE_PASSWORD:changeit}
      key-store-type: PKCS12
      # Require client certificate (mTLS)
      client-auth: need
      trust-store: ${PROFILES_TRUSTSTORE_PATH:classpath:truststore.jks}
      trust-store-password: ${PROFILES_TRUSTSTORE_PASSWORD:changeit}
      trust-store-type: JKS
spring:
  grpc:
    server:
      port: 9010
      servlet:
        enabled: false   # run gRPC on its own Netty port, not embedded in Servlet
      ssl:
        # Wire the SSL bundle defined below — spring-grpc creates TlsServerCredentials from it
        bundle: grpc-server-tls
        # REQUIRE means every gRPC client must present a valid certificate (mTLS)
        client-auth: REQUIRE
  ssl:
    bundle:
      jks:
        grpc-server-tls:
          keystore:
            location: ${PROFILES_GRPC_KEYSTORE_PATH:classpath:profiles-service.p12}
            password: ${PROFILES_GRPC_KEYSTORE_PASSWORD:changeit}
            type: PKCS12
          truststore:
            location: ${PROFILES_GRPC_TRUSTSTORE_PATH:classpath:truststore.jks}
            password: ${PROFILES_GRPC_TRUSTSTORE_PASSWORD:changeit}
            type: JKS
  config:
    import:
      - "optional:file:services/profiles/.env.properties"
      - "optional:configserver:"   # suppress Spring Cloud Config check when no server is available
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 5
        enable.idempotence: true
        spring.json.add.type.headers: false
  datasource:
    url: jdbc:postgresql://127.0.0.1:54322/postgres
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 150
      minimum-idle: 10
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 1200000
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9080/realms/spring/protocol/openid-connect/certs
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  application:
    name: profiles-service
  autoconfigure:
    # Disable gRPC JWT security auto-config — gRPC endpoints are internal only, no JWT required
    exclude:
      - org.springframework.grpc.autoconfigure.server.security.OAuth2ResourceServerAutoConfiguration
  cloud:
    config:
      enabled: false

# ----- Micrometer Tracing -----
# traceId / spanId are automatically written to MDC (visible in every log line)
# and exported to Zipkin when zipkin.tracing.endpoint is reachable.
management:
  tracing:
    sampling:
      probability: 1.0   # 100% sampling — reduce to 0.1 (10%) in production
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

app:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    presign-exp-seconds: 300
  cloudfront:
    domain: ${CLOUDFRONT_DOMAIN:d123example.cloudfront.net}
    enabled: ${CDN_ENABLED:false}
  geocoding:
    user-agent: "TinderClone/1.0 (tclone@tclone.com)"
    base-url: "https://nominatim.openstreetmap.org"
    country-codes:  "de,at,pl"
    timeout-ms: 5000
    retries: 3
    retry-backoff-ms: 400

cloud:
  aws:
    region: ${AWS_REGION:${AWS_DEFAULT_REGION:eu-north-1}}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID:placeholder-access-key}
      secret-key: ${AWS_SECRET_ACCESS_KEY:placeholder-secret-key}
    s3:
      endpoint: ${AWS_S3_ENDPOINT:}

keycloak:
  # Direct Keycloak URL — used by KeycloakAdminClient and UserService for Admin REST API calls
  keycloakUrl: ${KEYCLOAK_URL:http://localhost:9080}
  realm: spring
  client-id: spring-app
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin@1234}

media:
  service:
    base-url: ${MEDIA_SERVICE_BASE_URL:http://localhost:8040}
    ready-poll-max-attempts: ${MEDIA_READY_POLL_MAX_ATTEMPTS:30}
    ready-poll-interval-ms: ${MEDIA_READY_POLL_INTERVAL_MS:200}

# Kafka topics
kafka:
  topics:
    profile-events:
      updated: profile.updated
      created: profile.created
      deleted: profile.deleted

outbox:
  publisher:
    enabled: true
    batch-size: 100
    max-batches-per-run: 5
    poll-interval-ms: 1000
    initial-backoff-ms: 1000
    max-backoff-ms: 60000
    backoff-multiplier: 2.0
    send-timeout-ms: 5000
    max-retries: 10

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 30
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.lang.Exception
        ignoreExceptions:
          - java.lang.IllegalArgumentException
    instances:
      nominatimClient:
        baseConfig: default
        slowCallDurationThreshold: 1500ms
        failureRateThreshold: 60
      redisCache:
        baseConfig: default
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallDurationThreshold: 1000ms
        waitDurationInOpenState: 20s
      kafkaProducer:
        baseConfig: default
        slidingWindowSize: 50
        minimumNumberOfCalls: 10
        failureRateThreshold: 60
        slowCallDurationThreshold: 3000ms
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 10
  bulkhead:
    instances:
      nominatimClient:
        maxConcurrentCalls: 20
        maxWaitDuration: 0
      redisCache:
        maxConcurrentCalls: 500
        maxWaitDuration: 500ms
  retry:
    instances:
      nominatimClient:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      redisCache:
        maxAttempts: 2
        waitDuration: 100ms
