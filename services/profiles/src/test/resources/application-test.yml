spring:
  main:
    allow-bean-definition-overriding: true
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9080/realms/spring/protocol/openid-connect/certs
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  datasource:
    hikari:
      # Must be > max parallel threads (100) + background workers (outbox, etc.)
      # Each request uses exactly 1 connection — no REQUIRES_NEW overhead.
      maximum-pool-size: 200
      minimum-idle: 20
      connection-timeout: 10000   # 10 s — fail fast
      idle-timeout: 300000
      max-lifetime: 1200000
  application:
    name: profiles-service
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 5
        enable.idempotence: true
        spring.json.add.type.headers: false
    consumer:
      group-id: profiles-test-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.tinder.*"

spring:
  grpc:
    server:
      port: 0

server:
  # Main servlet port — must NOT conflict with the mTLS connector port (8011)
  port: 8010
  servlet:
    context-path: /api/v1/profiles

# Disable the second mTLS Tomcat connector in tests.
# Step 9 of ComprehensiveIntegrationTest probes port 8011 via isPortOpen()
# and skips live-TLS assertions when it is not reachable.
# To run live mTLS tests: start the full stack with docker-compose and set
# internal.server.ssl.enabled=true via env var or a separate test profile.
internal:
  server:
    port: 8011
    ssl:
      enabled: false
      key-store: classpath:profiles-service.p12
      key-store-password: changeit
      key-store-type: PKCS12
      client-auth: need
      trust-store: classpath:truststore-test.jks
      trust-store-password: changeit
      trust-store-type: JKS

app:
  s3:
    bucket: "test-bucket"
    presign-exp-seconds: 300
  geocoding:
    user-agent: "TinderClone/1.0 (tclone@tclone.com)"
    base-url: "https://nominatim.openstreetmap.org"
    country-codes: "de,at,pl"
    timeout-ms: 3000

cloud:
  aws:
    region: eu-north-1



keycloak:
  # Direct Keycloak URL — used by UserService and KeycloakAdminClient for Admin REST API calls
  keycloakUrl: ${KEYCLOAK_URL:http://localhost:9080}
  realm: spring
  client-id: profiles-service

# Kafka topics
kafka:
  topics:
    profile-events:
      updated: profile.updated
      created: profile.created
      deleted: profile.deleted
    match-events:
      created: match.created

integration:
  match:
    topic: match.created
    consumer-group-id: consumer-service-groupmatch.created
    verify-consumer-offsets: false

# Swipes service is reached via the API gateway.
# Override with swipes.base-url=http://localhost:8040 to hit swipes-demo directly.
swipes:
  base-url: http://localhost:8222

outbox:
  publisher:
    enabled: true
    batch-size: 200
    max-batches-per-run: 10
    poll-interval-ms: 100
    initial-backoff-ms: 100
    max-backoff-ms: 2000
    backoff-multiplier: 1.5
    send-timeout-ms: 5000
    max-retries: 3

# Resilience4j configuration for tests
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 1s
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.lang.Exception
        ignoreExceptions:
          - java.lang.IllegalArgumentException
    instances:
      nominatimClient:
        baseConfig: default
        slowCallDurationThreshold: 500ms
        failureRateThreshold: 60
      redisCache:
        baseConfig: default
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallDurationThreshold: 1000ms
        waitDurationInOpenState: 20s
      kafkaProducer:
        baseConfig: default
        slidingWindowSize: 50
        minimumNumberOfCalls: 10
        failureRateThreshold: 60
        slowCallDurationThreshold: 3000ms
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 10
  bulkhead:
    instances:
      nominatimClient:
        maxConcurrentCalls: 20
        maxWaitDuration: 0
      redisCache:
        maxConcurrentCalls: 200
        maxWaitDuration: 500ms
  retry:
    instances:
      nominatimClient:
        maxAttempts: 2
        waitDuration: 100ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      redisCache:
        maxAttempts: 2
        waitDuration: 100ms
