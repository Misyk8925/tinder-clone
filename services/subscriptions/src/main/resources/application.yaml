stripe:
  secret-key: ${STRIPE_SECRET_KEY:placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:placeholder}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:8095/success}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:8095/cancel}
  return-url: ${STRIPE_RETURN_URL:http://localhost:8095/return}
  price-id: ${STRIPE_PRICE_ID:placeholder}

grpc:
  # gRPC client — subscriptions-service calls profiles-service to promote users to premium
  client:
    profiles-service:
      address: ${PROFILES_GRPC_ADDRESS:static://localhost:9010}
      # Use TLS — mTLS SslContext is wired in GrpcMtlsConfig
      negotiation-type: tls
    mtls:
      enabled: ${GRPC_MTLS_ENABLED:true}
      # Client identity: subscriptions-service presents this keystore to profiles-service
      key-store: ${SUBSCRIPTIONS_GRPC_KEYSTORE_PATH:classpath:subscriptions-service.p12}
      key-store-password: ${SUBSCRIPTIONS_GRPC_KEYSTORE_PASSWORD:changeit}
      key-store-type: PKCS12
      # Truststore used to verify profiles-service server certificate
      trust-store: ${SUBSCRIPTIONS_GRPC_TRUSTSTORE_PATH:classpath:truststore.jks}
      trust-store-password: ${SUBSCRIPTIONS_GRPC_TRUSTSTORE_PASSWORD:changeit}
      trust-store-type: JKS
      # Must match CN / SAN in profiles-service.p12 (required for hostname verification over IP)
      override-authority: ${GRPC_OVERRIDE_AUTHORITY:profiles-service}
profiles:
  base-url: ${PROFILES_BASE_URL:placeholder}
server:
  port: 8095
spring:
  application:
    name: subscriptions-service
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
  datasource:
    url: ${SUBSCRIPTIONS_DB_URL:jdbc:postgresql://127.0.0.1:54334/subscriptions_db}
    username: ${SUBSCRIPTIONS_DB_USER:subscriptions_app}
    password: ${SUBSCRIPTIONS_DB_PASSWORD:change_me_subscriptions_db_password}
  config:
    import: "optional:file:services/subscriptions/.env.properties"
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:9080/realms/spring/protocol/openid-connect/certs}

resilience4j:
  circuitbreaker:
    instances:
      profiles-grpc:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true

